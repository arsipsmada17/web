<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Begarlist 16 - Arsip Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <!-- ROW 1: home · search · dark mode -->
    <div class="header-inner header-row1">
      <a href="https://begarlist16.github.io" class="home-btn" title="Kembali ke Homepage">
        <span class="home-emoji">🏠</span>
      </a>

      <!-- Search bar -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Cari video…"
          autocomplete="off"
          oninput="handleSearch(this.value)"
        />
        <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Hapus pencarian">✕</button>
      </div>

      <!-- Dark mode toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span id="themeIcon">☀</span>
      </button>
    </div>

    <!-- ROW 2: horizontal scrollable category strip with arrow nav -->
    <div class="category-row" id="categoryRow">
      <button class="cat-nav-btn cat-nav-left" id="catNavLeft" onclick="scrollCatNav(-1)" aria-label="Scroll kiri">‹</button>
      <div class="category-inner" id="categoryInner">
        <button class="cat-btn active" data-cat="all"            onclick="filterCategory('all',            this)">Semua</button>
        <button class="cat-btn" data-cat="Seni Tari"             onclick="filterCategory('Seni Tari',             this)">Seni Tari</button>
        <button class="cat-btn" data-cat="Film Pendek ID"        onclick="filterCategory('Film Pendek ID',        this)">Film Pendek ID</button>
        <button class="cat-btn" data-cat="Short Movie EN"        onclick="filterCategory('Short Movie EN',        this)">Short Movie EN</button>
        <button class="cat-btn" data-cat="Reportase"             onclick="filterCategory('Reportase',             this)">Reportase</button>
        <button class="cat-btn" data-cat="Dokudrama"             onclick="filterCategory('Dokudrama',             this)">Dokudrama</button>
        <button class="cat-btn" data-cat="Dokumentasi"           onclick="filterCategory('Dokumentasi',           this)">Dokumentasi</button>
        <button class="cat-btn" data-cat="Kompilasi"             onclick="filterCategory('Kompilasi',             this)">Kompilasi</button>
      </div>
      <button class="cat-nav-btn cat-nav-right" id="catNavRight" onclick="scrollCatNav(1)" aria-label="Scroll kanan">›</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">

    <!-- Section title -->
    <div class="section-header" id="sectionHeader">
      <h2 class="section-title" id="sectionTitle">Semua Video</h2>
      <span class="section-count" id="sectionCount"></span>
    </div>

    <!-- Search results notice -->
    <div class="search-notice" id="searchNotice" style="display:none">
      <span>Hasil pencarian untuk: </span><strong id="searchTerm"></strong>
      <button class="clear-search" onclick="clearSearch()">✕ Hapus</button>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">◎</div>
      <p class="empty-title">Tidak ada video ditemukan</p>
      <p class="empty-sub">Coba kata kunci lain atau pilih kategori berbeda.</p>
    </div>

  </main>

  <!-- VIDEO MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-video-wrap">
        <iframe
          id="modalIframe"
          src=""
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
      <div class="modal-info">
        <span class="modal-cat" id="modalCat"></span>
        <h2 class="modal-title" id="modalTitle"></h2>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2025 Begarlist 16 · Dibuat dengan ♥ · Semua video dari YouTube</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>

<script src="/pwa-register.js"></script>
</body>
</html>
